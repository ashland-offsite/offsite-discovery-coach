<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offsite Discovery Coach — AirOps</title>
  <style>
    /* ── Brand tokens ─────────────────────────────────────────── */
    :root {
      --white: #ffffff;
      --off-white: #F8FFFA;
      --near-black: #000d05;
      --green-50: #f8fffb;
      --green-100: #dfeae3;
      --green-200: #CCFFE0;
      --green-500: #008c44;
      --green-600: #002910;
      --interaction: #00ff64;
      --accent-label: #EEFF8C;
      --text-primary: #09090b;
      --text-secondary: #676c79;
      --text-tertiary: #a5aab6;
      --stroke-primary: #ecedef;
      --stroke-green: #d4e8da;
      --font-sans: 'Saans', 'Helvetica Neue', Arial, sans-serif;
      --font-serif: 'Serrif VF', Georgia, serif;
      --font-mono: 'Saans Mono', 'DM Mono', 'Courier New', monospace;
    }

    /* ── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--off-white);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .site-header {
      background: var(--green-600);
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo svg { display: block; height: 22px; width: auto; }

    .header-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--near-black);
      background: var(--accent-label);
      padding: 4px 10px;
      border-radius: 0;
    }

    /* ── Hero ─────────────────────────────────────────────────── */
    .hero {
      background: var(--near-black);
      padding: 48px 48px 40px;
      border-bottom: 1px solid var(--green-500);
    }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--interaction);
      margin-bottom: 12px;
    }

    .hero h1 {
      font-family: var(--font-serif);
      font-size: 40px;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.04;
      color: var(--white);
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      max-width: 560px;
    }

    /* ── Progress bar ─────────────────────────────────────────── */
    .progress-bar-wrapper {
      background: var(--white);
      border-bottom: 1px solid var(--stroke-green);
      padding: 0 48px;
      display: flex;
      align-items: stretch;
      gap: 0;
      overflow-x: auto;
    }

    .progress-step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px 14px 0;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }

    .progress-step + .progress-step {
      padding-left: 20px;
      border-left: 1px solid var(--stroke-primary);
      margin-left: 0;
    }

    .progress-step.active { color: var(--green-500); border-bottom-color: var(--green-500); }
    .progress-step.done { color: var(--text-secondary); border-bottom-color: var(--green-100); }

    .step-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Main layout ──────────────────────────────────────────── */
    .main {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Answered cards (history) ─────────────────────────────── */
    .history { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .history-card {
      background: var(--white);
      border: 1px solid var(--stroke-green);
      border-radius: 0;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      opacity: 0.7;
    }

    .history-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--green-200);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .history-check svg { display: block; }

    .history-q {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .history-a {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--green-500);
    }

    /* ── Active question card ─────────────────────────────────── */
    .active-card-wrapper {
      perspective: 1200px;
    }

    .flip-card {
      width: 100%;
      min-height: 280px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .flip-card.flipped { transform: rotateY(180deg); }

    .flip-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .flip-face.back {
      transform: rotateY(180deg);
    }

    /* Front face */
    .card-front {
      background: var(--white);
      border: 1px solid var(--stroke-green);
      border-left: 3px solid var(--green-500);
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      min-height: 280px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card-front.outcome-card {
      border-left: 3px solid var(--interaction);
      background: var(--green-600);
      color: var(--white);
    }

    .card-front.educate-card {
      border-left: 3px solid var(--accent-label);
      background: #fefffe;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      background: var(--accent-label);
      border: none;
      border-radius: 0;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--near-black);
      line-height: 1;
    }

    .pill.pill-green {
      background: var(--green-200);
      color: var(--green-600);
    }

    .pill.pill-dark {
      background: var(--green-500);
      color: var(--white);
    }

    .card-question {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: 8px;
      flex: 1;
    }

    .outcome-card .card-question { color: var(--white); }

    .card-sub {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* Outcome details list */
    .outcome-details {
      list-style: none;
      padding: 0;
      margin: 16px 0 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .outcome-details li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      line-height: 1.4;
    }

    .outcome-details li::before {
      content: '→';
      color: var(--interaction);
      font-family: var(--font-mono);
      font-size: 12px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    /* Choices */
    .card-choices {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .choice-btn {
      background: var(--near-black);
      color: var(--white);
      border: none;
      padding: 11px 20px;
      border-radius: 0;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }

    .choice-btn:hover { background: var(--green-500); }
    .choice-btn:active { transform: scale(0.98); }

    .choice-btn.accent {
      background: var(--interaction);
      color: var(--near-black);
    }

    .choice-btn.accent:hover { background: #00e65c; }

    /* Flip button */
    .flip-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: none;
      border: 1px solid var(--stroke-green);
      padding: 6px 12px;
      border-radius: 0;
      cursor: pointer;
      margin-left: auto;
      margin-top: 20px;
      transition: color 0.15s, border-color 0.15s;
    }

    .flip-toggle:hover { color: var(--green-500); border-color: var(--green-500); }

    .outcome-card .flip-toggle {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
    }
    .outcome-card .flip-toggle:hover {
      color: var(--interaction);
      border-color: var(--interaction);
    }

    /* Back face (coaching) */
    .card-back {
      background: var(--green-600);
      border: 1px solid var(--green-500);
      border-left: 3px solid var(--interaction);
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      min-height: 280px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .coaching-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--interaction);
      margin-bottom: 12px;
    }

    .coaching-title {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .coaching-body {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      line-height: 1.65;
      flex: 1;
    }

    .coaching-stat {
      margin-top: 20px;
      padding: 14px 16px;
      background: rgba(0,255,100,0.08);
      border-left: 2px solid var(--interaction);
    }

    .coaching-stat p {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }

    .coaching-stat strong {
      color: var(--interaction);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: 4px;
    }

    /* Restart button */
    .restart-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--stroke-green);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-top: 24px;
    }
    .restart-btn:hover { color: var(--green-500); border-color: var(--green-500); }

    /* Research link */
    .card-research-link {
      display: inline-flex;
      align-items: center;
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--green-500);
      text-decoration: none;
      border-bottom: 1px solid var(--stroke-green);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .card-research-link:hover { color: var(--green-600); border-color: var(--green-500); }

    /* Inline back button inside card-meta */
    .card-back-btn {
      margin-left: auto;
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px 0;
      transition: color 0.15s;
    }
    .card-back-btn:hover { color: var(--green-500); }
    .outcome-card .card-back-btn { color: rgba(255,255,255,0.35); }
    .outcome-card .card-back-btn:hover { color: var(--interaction); }

    /* Animate-in for new cards */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-in { animation: slideIn 0.35s ease both; }

    /* Reframe callout */
    .reframe-box {
      margin: 20px 0 0;
      padding: 14px 16px;
      background: var(--green-50);
      border: 1px solid var(--stroke-green);
      border-left: 3px solid var(--green-500);
    }
    .reframe-box p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .reframe-box strong { color: var(--green-600); }

    /* Responsive */
    @media (max-width: 600px) {
      .site-header { padding: 0 20px; }
      .hero { padding: 32px 20px 28px; }
      .hero h1 { font-size: 28px; }
      .progress-bar-wrapper { padding: 0 20px; }
      .main { padding: 28px 16px 64px; }
      .card-front, .card-back { padding: 20px; }
      .card-question { font-size: 17px; }
    }
  </style>
</head>
<body>

  <div class="header-pill">Offsite</div>
</header>

<!-- ── Hero ────────────────────────────────────────────────── -->
<div class="hero">
  <div class="hero-eyebrow">Sales Discovery Tool</div>
  <h1>Offsite discovery coach</h1>
  <p>Walk through the discovery conversation step by step. Answer each question as your prospect would. Flip any card to test your coaching knowledge before moving on.</p>
</div>

<!-- ── Progress bar ──────────────────────────────────────── -->
<div class="progress-bar-wrapper" id="progressBar">
  <div class="progress-step active" data-section="1">
    <span class="step-dot"></span>AI visibility priority
  </div>
  <div class="progress-step" data-section="2">
    <span class="step-dot"></span>Link building status
  </div>
  <div class="progress-step" data-section="3">
    <span class="step-dot"></span>Execution approach
  </div>
  <div class="progress-step" data-section="4">
    <span class="step-dot"></span>Recommendation
  </div>
</div>

<!-- ── Main content ──────────────────────────────────────── -->
<main class="main">
  <div class="history" id="history"></div>
  <div id="activeCard"></div>
  <button class="restart-btn" id="restartBtn" onclick="restart()" style="display:none;">
    ↺ &nbsp;Start over
  </button>
</main>

<script>
/* ─────────────────────────────────────────────────────────────────
   Decision tree data

const TREE = {

  /* ── Section 1: AI Visibility Priority ── */

/* ─────────────────────────────────────────────────────────────────
   App state
───────────────────────────────────────────────────────────────── */
let history = [];   // [{nodeId, choiceLabel}]
let currentId = 'q1';
let isFlipped = false;

/* ─────────────────────────────────────────────────────────────────
   Render
───────────────────────────────────────────────────────────────── */
function render() {
  renderHistory();
  renderActive();
  renderProgress();
  document.getElementById('restartBtn').style.display =
    TREE[currentId].type === 'outcome' ? 'inline-flex' : 'none';
}

function renderProgress() {
  const node = TREE[currentId];
  const steps = document.querySelectorAll('.progress-step');
  steps.forEach(s => {
    const sec = parseInt(s.dataset.section);
    s.classList.remove('active', 'done');
    if (sec === node.section) s.classList.add('active');
    else if (sec < node.section) s.classList.add('done');
  });
}

function renderHistory() {
  const el = document.getElementById('history');
  el.innerHTML = history.map(item => {
    const node = TREE[item.nodeId];
    const q = node.type === 'educate' ? '[Coach note] ' + node.pill : node.question;
    return `
      <div class="history-card">
        <div class="history-check">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="#008c44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="history-q">${escHtml(q)}</div>
          <div class="history-a">${escHtml(item.choiceLabel)}</div>
        </div>
      </div>`;
  }).join('');
}

function renderActive() {
  const el = document.getElementById('activeCard');
  const node = TREE[currentId];
  isFlipped = false;

  const pillClass = node.type === 'outcome'
    ? (node.isDisqualify ? 'pill-green' : 'pill-dark')
    : '';

  /* Build front face */
  let frontContent = '';

  // Pill + meta (with inline back button)
  const backBtn = history.length > 0
    ? `<button class="card-back-btn" onclick="back()">← Back</button>`
    : '';
  frontContent += `<div class="card-meta"><span class="pill ${pillClass}">${escHtml(node.pill)}</span>${backBtn}</div>`;

  // Question / headline
  const cardClass = node.type === 'outcome'
    ? 'card-front outcome-card'
    : node.type === 'educate' ? 'card-front educate-card' : 'card-front';

  frontContent += `<div class="card-question">${escHtml(node.question)}</div>`;

  // Sub-text
  if (node.sub) {
    frontContent += `<div class="card-sub">${escHtml(node.sub)}</div>`;
  }

  // Body for educate nodes
  if (node.type === 'educate' && node.body) {
    frontContent += `<div class="card-sub" style="margin-top:8px;">${escHtml(node.body)}</div>`;
  }

  // Optional research link
  if (node.link) {
    frontContent += `<a href="${node.link.url}" target="_blank" rel="noopener" class="card-research-link">${escHtml(node.link.label)}</a>`;
  }

  // Outcome details
  if (node.type === 'outcome' && node.details) {
    frontContent += `<ul class="outcome-details">`;
    node.details.forEach(d => {
      frontContent += `<li>${escHtml(d)}</li>`;
    });
    frontContent += `</ul>`;
  }

  // Choices
  if (node.choices && node.choices.length) {
    frontContent += `<div class="card-choices">`;
    node.choices.forEach((c, i) => {
      const btnClass = (node.type === 'outcome' || (node.choices.length === 1 && node.type === 'educate'))
        ? 'choice-btn accent'
        : 'choice-btn';
      frontContent += `<button class="${btnClass}" onclick="choose('${currentId}','${escAttr(c.next)}','${escAttr(c.label)}')">${escHtml(c.label)}</button>`;
    });
    frontContent += `</div>`;
  }

  // Flip button
  if (node.coaching) {
    frontContent += `<button class="flip-toggle" onclick="flipCard()">
      Coaching context &nbsp;→
    </button>`;
  }

  /* Build back face */
  let backContent = '';
  if (node.coaching) {
    backContent += `<div class="coaching-eyebrow">Rep coaching</div>`;
    backContent += `<div class="coaching-title">${escHtml(node.coaching.title)}</div>`;
    backContent += `<div class="coaching-body">${escHtml(node.coaching.body)}</div>`;
    if (node.coaching.stat) {
      backContent += `<div class="coaching-stat"><strong>${escHtml(node.coaching.stat.label)}</strong><p>${escHtml(node.coaching.stat.text)}</p></div>`;
    }
    backContent += `<button class="flip-toggle" onclick="flipCard()">← Back to question</button>`;
  }

  el.innerHTML = `
    <div class="active-card-wrapper slide-in">
      <div class="flip-card" id="flipCard">
        <div class="flip-face front">
          <div class="${cardClass}">${frontContent}</div>
        </div>
        <div class="flip-face back">
          <div class="card-back">${backContent}</div>
        </div>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────────────────────
   Actions
───────────────────────────────────────────────────────────────── */
function choose(fromId, nextId, label) {
  history.push({ nodeId: fromId, choiceLabel: label });
  currentId = nextId;
  render();
  // Scroll to top of active card
  setTimeout(() => {
    const el = document.getElementById('activeCard');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

function flipCard() {
  isFlipped = !isFlipped;
  const card = document.getElementById('flipCard');
  if (card) {
    card.classList.toggle('flipped', isFlipped);
  }
}

function back() {
  if (history.length === 0) return;
  const prev = history.pop();
  currentId = prev.nodeId;
  isFlipped = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  history = [];
  currentId = 'q1';
  isFlipped = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─────────────────────────────────────────────────────────────────
   Helpers
───────────────────────────────────────────────────────────────── */
function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escAttr(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, "\\'");
}

/* ─────────────────────────────────────────────────────────────────
   Boot
───────────────────────────────────────────────────────────────── */
render();
</script>
